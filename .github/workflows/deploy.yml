name: Zomato CI/CD

on:
  push:
    branches:
      - master   # (or main based on your repo)

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Login to DockerHub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Build Frontend Image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/zomato-frontend ./frontend

    - name: Build Backend Image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/zomato-backend ./backend

    - name: Push Frontend Image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/zomato-frontend

    - name: Push Backend Image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/zomato-backend